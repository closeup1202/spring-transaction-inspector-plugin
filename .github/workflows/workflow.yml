name: Publish IntelliJ Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Release 생성 권한 추가

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}

      - name: Extract Version
        run: echo "VERSION=${GITHUB_REF##*/}" | sed 's/^v//' >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ### Version 1.0.3 - Jakarta EE Support
            #### Jakarta Transaction Support
                   - Now detects `jakarta.transaction.Transactional` (Jakarta EE 9+)
                   - Now detects `javax.transaction.Transactional` (Java EE / Jakarta EE 8-)
                   - Supported inspections: AOP Proxy Bypass, Invalid Modifiers, @Async Conflicts, Gutter Icons
            #### IDE Compatibility
                   - Extended support to IntelliJ IDEA 2025.3 (build 253.*)
            ---
            🔗 [View on JetBrains Marketplace](https://plugins.jetbrains.com/plugin/28789-spring-transaction-inspector)
          draft: false
          prerelease: false
          files: build/distributions/spring-transaction-inspector-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}